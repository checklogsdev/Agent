version: '3.8'

# CheckLogs Monitoring Agent
# The user ONLY needs to configure API_KEY and UDP_PORT from the dashboard
# The agent automatically sends metrics to api.checklogs.dev

services:
  agent:
    image: checklogsdev/agent:latest
    container_name: checklogs_agent
    restart: unless-stopped
    
    privileged: true
    network_mode: host
    
    environment:
      # ============================================
      # REQUIRED: Get these from CheckLogs Dashboard
      # ============================================
      CHECKLOGS_API_KEY: ${CHECKLOGS_API_KEY}
      CHECKLOGS_API_PORT: ${CHECKLOGS_API_PORT}
      
      # ============================================
      # FIXED: API Host (user doesn't change this)
      # ============================================
      CHECKLOGS_API_HOST: api.checklogs.dev
      
      # ============================================
      # Optional Configuration
      # ============================================
      SERVER_NAME: ${SERVER_NAME:-My Server}
      COLLECT_INTERVAL: ${COLLECT_INTERVAL:-10}
      
      COLLECT_CPU: ${COLLECT_CPU:-true}
      COLLECT_RAM: ${COLLECT_RAM:-true}
      COLLECT_DISK: ${COLLECT_DISK:-true}
      COLLECT_LOAD: ${COLLECT_LOAD:-true}
      COLLECT_PROCESSES: ${COLLECT_PROCESSES:-true}
      
      TOP_PROCESSES_COUNT: ${TOP_PROCESSES_COUNT:-10}
      
      ANOMALY_DETECTION: ${ANOMALY_DETECTION:-true}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:-50}
      
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /etc/hostname:/etc/hostname:ro
      - /etc/os-release:/etc/os-release:ro
      - agent_logs:/var/log/checklogs
      - agent_state:/var/lib/checklogs
    
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  agent_logs:
  agent_state:

# ============================================
# QUICK START - Copy and paste this:
# ============================================
# 
# 1. Create directory:
#    mkdir -p /opt/checklogs && cd /opt/checklogs
#
# 2. Download this file:
#    curl -o docker-compose.yml https://raw.githubusercontent.com/checklogsdev/Agent/main/docker-compose.yml
#
# 3. Create .env with YOUR credentials from dashboard:
#    cat > .env << 'EOF'
#    CHECKLOGS_API_KEY=your_api_key_from_dashboard
#    CHECKLOGS_API_PORT=your_udp_port_from_dashboard
#    SERVER_NAME=My Production Server
#    EOF
#
# 4. Start:
#    docker-compose up -d
#
# 5. Check logs:
#    docker-compose logs -f
#
# That's it! No IP configuration needed.
# The agent sends data to api.checklogs.dev automatically.
#