version: '3.8'

# CheckLogs Agent - Docker pour clients
# Installation sur chaque serveur à monitorer
# Repository: https://github.com/checklogsdev/dockerfile

services:
  # =============================================
  # Agent de monitoring Go
  # =============================================
  agent:
    image: checklogsdev/agent:latest
    container_name: checklogs_agent
    restart: unless-stopped
    
    # Accès au système hôte pour collecter les métriques
    privileged: true
    
    environment:
      # Configuration CheckLogs API
      CHECKLOGS_API_HOST: ${CHECKLOGS_API_HOST}
      CHECKLOGS_API_PORT: ${CHECKLOGS_API_PORT}
      CHECKLOGS_API_KEY: ${CHECKLOGS_API_KEY}
      
      # Configuration serveur
      SERVER_NAME: ${SERVER_NAME}
      SERVER_HOSTNAME: ${SERVER_HOSTNAME:-auto}
      
      # Fréquence de collecte (en secondes)
      COLLECT_INTERVAL: ${COLLECT_INTERVAL:-10}
      
      # Métriques à collecter
      COLLECT_CPU: ${COLLECT_CPU:-true}
      COLLECT_RAM: ${COLLECT_RAM:-true}
      COLLECT_DISK: ${COLLECT_DISK:-true}
      COLLECT_LOAD: ${COLLECT_LOAD:-true}
      COLLECT_PROCESSES: ${COLLECT_PROCESSES:-true}
      COLLECT_NETWORK: ${COLLECT_NETWORK:-false}
      
      # Top processus
      TOP_PROCESSES_COUNT: ${TOP_PROCESSES_COUNT:-10}
      
      # Détection anomalies
      ANOMALY_DETECTION: ${ANOMALY_DETECTION:-true}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:-50}
      
      # Logs
      LOG_LEVEL: ${LOG_LEVEL:-info}
    
    volumes:
      # Accès en lecture seule au système hôte
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /etc/hostname:/etc/hostname:ro
      - /etc/os-release:/etc/os-release:ro
      
      # Logs de l'agent
      - agent_logs:/var/log/checklogs
    
    # Pas de réseau exposé (communication sortante UDP uniquement)
    network_mode: host
    
    # Limites de ressources (max 20% CPU, 250MB RAM)
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 250M
        reservations:
          cpus: '0.05'
          memory: 50M
    
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  agent_logs:
    driver: local
